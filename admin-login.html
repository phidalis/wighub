    <style>
        /* Device Block Overlay Styles */
        #deviceBlockOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        
        .block-content {
            background: linear-gradient(135deg, #ff4757, #ff3838);
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 20px 40px rgba(255, 56, 56, 0.4); }
            50% { box-shadow: 0 20px 60px rgba(255, 56, 56, 0.6); }
            100% { box-shadow: 0 20px 40px rgba(255, 56, 56, 0.4); }
        }
        
        .countdown-box {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            margin: 25px 0;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .countdown-time {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .device-id {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
        }
        
        .login-form.disabled {
            opacity: 0.5;
            pointer-events: none;
            position: relative;
        }
        
        .login-form.disabled::after {
            content: "🔒 Device Temporarily Blocked";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 71, 87, 0.9);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            z-index: 10;
        }
        
        .contact-admin {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .contact-admin a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>

            <div class="login-note">

        </div>
        
        <div class="login-sidebar">
            <div class="sidebar-content">
                <h2><i class="fas fa-shield-alt"></i> Admin Features</h2>

<!-- Main Login Script -->
<script type="module">
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    
    // ============================================
    // DEVICE BLOCKING SYSTEM
    // ============================================
    const MAX_ADMIN_ATTEMPTS = 5;
    const BLOCK_DURATION = 60 * 60 * 1000;
    
    function getDeviceId() {
        const components = {
            platform: navigator.platform,
            language: navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            screen: `${screen.width}x${screen.height}`,
            colorDepth: screen.colorDepth,
            hardwareConcurrency: navigator.hardwareConcurrency || 'unknown',
            maxTouchPoints: navigator.maxTouchPoints || 0
        };
        const dataString = JSON.stringify(components);
        let hash = 0;
        for (let i = 0; i < dataString.length; i++) {
            const char = dataString.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return 'admin_device_' + Math.abs(hash).toString(36);
    }
    
    function trackFailedAdminLogin() {
        const deviceId = getDeviceId();
        const now = Date.now();
        const attemptsKey = `admin_attempts_${deviceId}`;
        let attempts = JSON.parse(localStorage.getItem(attemptsKey) || '[]');
        const oneDayAgo = now - (24 * 60 * 60 * 1000);
        attempts = attempts.filter(time => time > oneDayAgo);
        attempts.push(now);
        localStorage.setItem(attemptsKey, JSON.stringify(attempts));
        
        if (attempts.length >= MAX_ADMIN_ATTEMPTS) {
            blockAdminDevice(deviceId);
            return { blocked: true, attemptsLeft: 0, attempts: attempts.length, blockedUntil: now + BLOCK_DURATION };
        }
        return { blocked: false, attemptsLeft: MAX_ADMIN_ATTEMPTS - attempts.length, attempts: attempts.length };
    }
    
    function blockAdminDevice(deviceId) {
        const blockKey = `admin_block_${deviceId}`;
        const blockData = {
            deviceId: deviceId,
            blockedAt: Date.now(),
            blockedUntil: Date.now() + BLOCK_DURATION,
            reason: 'too_many_failed_admin_logins',
            deviceInfo: { platform: navigator.platform, screen: `${screen.width}x${screen.height}` }
        };
        localStorage.setItem(blockKey, JSON.stringify(blockData));
        setTimeout(() => {
            localStorage.removeItem(blockKey);
            localStorage.removeItem(`admin_attempts_${deviceId}`);
        }, BLOCK_DURATION);
        showAdminBlockUI(deviceId, blockData.blockedUntil);
    }
    
    function isAdminDeviceBlocked() {
        const deviceId = getDeviceId();
        const blockKey = `admin_block_${deviceId}`;
        const blockData = localStorage.getItem(blockKey);
        if (!blockData) return false;
        const block = JSON.parse(blockData);
        const now = Date.now();
        if (now < block.blockedUntil) {
            return { blocked: true, deviceId: deviceId, blockedUntil: block.blockedUntil, minutesLeft: Math.ceil((block.blockedUntil - now) / 60000) };
        }
        localStorage.removeItem(blockKey);
        localStorage.removeItem(`admin_attempts_${deviceId}`);
        return false;
    }
    
    function resetAdminLoginAttempts() {
        const deviceId = getDeviceId();
        localStorage.removeItem(`admin_attempts_${deviceId}`);
        localStorage.removeItem(`admin_block_${deviceId}`);
    }
    
    function showAdminBlockUI(deviceId, blockedUntil) {
        const existingOverlay = document.getElementById('deviceBlockOverlay');
        if (existingOverlay) existingOverlay.remove();
        const now = Date.now();
        const minutesLeft = Math.ceil((blockedUntil - now) / 60000);
        const overlay = document.createElement('div');
        overlay.id = 'deviceBlockOverlay';
        overlay.innerHTML = `
            <div class="block-content">
                <div style="font-size: 60px; margin-bottom: 20px;">🔒</div>
                <h2>ADMIN ACCESS BLOCKED</h2>
                <p>Too many failed login attempts detected from this device.</p>
                <div class="countdown-box">
                    <div class="countdown-time" id="countdownTime">${minutesLeft}</div>
                    <div>minutes remaining</div>
                </div>
                <div class="contact-admin">Contact another administrator to unblock this device.</div>
            </div>
        `;
        document.body.appendChild(overlay);
        const loginForm = document.getElementById('adminLoginForm');
        if (loginForm) loginForm.classList.add('disabled');
        startCountdown(blockedUntil);
    }
    
    function startCountdown(blockedUntil) {
        const update = () => {
            const now = Date.now();
            const minutesLeft = Math.ceil((blockedUntil - now) / 60000);
            if (minutesLeft <= 0) {
                const deviceId = getDeviceId();
                localStorage.removeItem(`admin_block_${deviceId}`);
                localStorage.removeItem(`admin_attempts_${deviceId}`);
                document.getElementById('deviceBlockOverlay')?.remove();
                const loginForm = document.getElementById('adminLoginForm');
                if (loginForm) loginForm.classList.remove('disabled');
                location.reload();
                return;
            }
            const countdownEl = document.getElementById('countdownTime');
            if (countdownEl) countdownEl.textContent = minutesLeft;
        };
        update();
        setInterval(update, 60000);
    }
    
    function showAttemptsCounter(attemptsLeft, attempts) {
        const counter = document.getElementById('attemptsCounter');
        const text = document.getElementById('attemptsText');
        if (attemptsLeft > 0 && counter && text) {
            counter.style.display = 'block';
            text.textContent = `${attempts} failed attempt(s). ${attemptsLeft} attempt(s) remaining before device is blocked.`;
        } else if (counter) {
            counter.style.display = 'none';
        }
    }
    
    // ===== MAIN LOGIN HANDLER - FIREBASE =====
    document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const blockCheck = isAdminDeviceBlocked();
        if (blockCheck) {
            alert(`This device is temporarily blocked. Please try again in ${blockCheck.minutesLeft} minutes.`);
            showAdminBlockUI(blockCheck.deviceId, blockCheck.blockedUntil);
            return;
        }
        
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        const rememberMe = document.getElementById('rememberMe').checked;
        
        try {
            // Sign in with Firebase Auth
            const userCredential = await signInWithEmailAndPassword(window.auth, email, password);
            const firebaseUser = userCredential.user;
            
            // Get admin data from Firestore
            const adminDoc = await getDoc(doc(window.db, 'admins', firebaseUser.uid));
            
            if (!adminDoc.exists()) {
                throw new Error('Admin account not found');
            }
            
            const adminData = adminDoc.data();
            
            if (adminData.status !== 'active') {
                alert('Your admin account has been suspended.');
                await window.auth.signOut();
                return;
            }
            
            // Reset attempts on success
            resetAdminLoginAttempts();
            const counter = document.getElementById('attemptsCounter');
            if (counter) counter.style.display = 'none';
            
            // Set session
            localStorage.setItem('adminToken', firebaseUser.uid);
            localStorage.setItem('adminUser', JSON.stringify({
                uid: firebaseUser.uid,
                email: adminData.email,
                name: adminData.name,
                role: adminData.role
            }));
            
            if (rememberMe) {
                localStorage.setItem('rememberedAdmin', email);
            } else {
                localStorage.removeItem('rememberedAdmin');
            }
            
            // Update last login
            await updateDoc(doc(window.db, 'admins', firebaseUser.uid), {
                lastLogin: new Date().toISOString()
            });
            
            console.log('Admin login successful');
            window.location.href = 'admin-dashboard.html';
            
        } catch (error) {
            console.error('Admin login error:', error);
            const result = trackFailedAdminLogin();
            showAttemptsCounter(result.attemptsLeft, result.attempts);
            
            if (result.blocked) {
                alert('Too many failed login attempts! This device is now BLOCKED for 1 hour.');
                showAdminBlockUI(getDeviceId(), result.blockedUntil);
            } else {
                alert('Invalid email or password. ' + result.attemptsLeft + ' attempt(s) remaining.');
            }
        }
    });
    
    // Check block status on page load
    document.addEventListener('DOMContentLoaded', function() {
        const blockCheck = isAdminDeviceBlocked();
        if (blockCheck) {
            showAdminBlockUI(blockCheck.deviceId, blockCheck.blockedUntil);
        }
        
        const rememberedAdmin = localStorage.getItem('rememberedAdmin');
        if (rememberedAdmin) {
            const emailField = document.getElementById('adminEmail');
            const rememberCheck = document.getElementById('rememberMe');
            if (emailField) emailField.value = rememberedAdmin;
            if (rememberCheck) rememberCheck.checked = true;
        }
        
        // Show existing attempts if any
        const deviceId = getDeviceId();
        const attempts = JSON.parse(localStorage.getItem(`admin_attempts_${deviceId}`) || '[]');
        if (attempts.length > 0) {
            const attemptsLeft = MAX_ADMIN_ATTEMPTS - attempts.length;
            if (attemptsLeft > 0) {
                showAttemptsCounter(attemptsLeft, attempts.length);
            }
        }
    });
</script>
    </body>
